<div id="cd-core"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#3C3489',
    primaryBorderColor: dark ? '#7F77DD' : '#534AB7',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    secondaryTextColor: dark ? '#9FE1CB' : '#085041',
    secondaryBorderColor: dark ? '#1D9E75' : '#0F6E56',
    tertiaryColor: dark ? '#444441' : '#F1EFE8',
    tertiaryTextColor: dark ? '#D3D1C7' : '#444441',
    tertiaryBorderColor: dark ? '#888780' : '#5F5E5A',
    noteBkgColor: dark ? '#633806' : '#FAEEDA',
    noteTextColor: dark ? '#FAC775' : '#633806',
    classText: dark ? '#c2c0b6' : '#3d3d3a',
    background: 'transparent',
  },
  classDiagram: { useMaxWidth: true }
});

const diagram = `classDiagram
  direction TB

  class BackupJob {
    <<entity>>
    +int Id
    +string Name
    +string SourcePath
    +string TargetPath
    +BackupType Type
    +DateTime? LastFullBackupDate
    +BackupStatus Status
    +Execute() void
    +GetSummary() string
  }

  class BackupType {
    <<enumeration>>
    Full
    Differential
  }

  class BackupStatus {
    <<enumeration>>
    Inactive
    Active
    Completed
    Error
  }

  class IBackupStrategy {
    <<interface>>
    +Execute(BackupJob job, IFileSystem fs, ILogger logger) void
  }

  class FullBackupStrategy {
    <<service>>
    +Execute(BackupJob job, IFileSystem fs, ILogger logger) void
    -CopyAll(string src, string dest, IFileSystem fs) void
  }

  class DifferentialBackupStrategy {
    <<service>>
    +Execute(BackupJob job, IFileSystem fs, ILogger logger) void
    -IsModifiedSince(string file, DateTime since) bool
    -CopyIfNewer(string src, string dest, IFileSystem fs) void
  }

  class BackupService {
    <<service>>
    -List~BackupJob~ _jobs
    -IBackupStrategy _strategy
    -IStateRepository _stateRepo
    +ExecuteOne(int index) void
    +ExecuteAll() void
    +ExecuteRange(int from, int to) void
    +ExecuteList(List~int~ indices) void
    -ResolveStrategy(BackupJob job) IBackupStrategy
  }

  class JobManager {
    <<service>>
    -List~BackupJob~ _jobs
    -IConfigRepository _configRepo
    +Add(BackupJob job) void
    +Update(int index, BackupJob job) void
    +Delete(int index) void
    +GetAll() List~BackupJob~
    +ValidatePaths(string src, string dest) bool
    +MaxJobsReached() bool
  }

  class IConfigRepository {
    <<interface>>
    +Load() List~BackupJob~
    +Save(List~BackupJob~ jobs) void
  }

  class IStateRepository {
    <<interface>>
    +Update(List~BackupJob~ jobs) void
    +Clear() void
  }

  class ILogger {
    <<interface>>
    +Log(LogEntry entry) void
  }

  class LogEntry {
    <<value object>>
    +DateTime Timestamp
    +string JobName
    +string SourceFile
    +string DestFile
    +long FileSizeBytes
    +long TransferTimeMs
  }

  class BackupProgress {
    <<value object>>
    +int TotalFiles
    +long TotalSizeBytes
    +int RemainingFiles
    +long RemainingBytes
    +int ProgressPercent
    +string CurrentSourceFile
    +string CurrentDestFile
  }

  BackupJob --> BackupType : type
  BackupJob --> BackupStatus : status
  BackupJob --> IBackupStrategy : uses
  IBackupStrategy <|.. FullBackupStrategy : implements
  IBackupStrategy <|.. DifferentialBackupStrategy : implements
  BackupService --> JobManager : uses
  BackupService --> IBackupStrategy : resolves
  BackupService --> IStateRepository : updates
  BackupService --> ILogger : logs via
  BackupService --> BackupProgress : produces
  JobManager --> IConfigRepository : persists via
  JobManager "1" --> "0..5" BackupJob : manages
  ILogger --> LogEntry : writes
`;

const { svg } = await mermaid.render('cd-core-svg', diagram);
document.getElementById('cd-core').innerHTML = svg;

document.querySelectorAll('#cd-core svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
</script>
